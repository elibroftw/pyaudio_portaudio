name: Build Windows Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Verify setup.py version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -oP "__version__\s*=\s*['\"]\K[^'\"]+" pyaudio/setup.py)
          echo "tag version:      $tag"
          echo "setup.py version: $ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match setup.py __version__ ('$ver')"
            exit 1
          fi

  build:
    needs: check-version
    # https://github.com/actions/runner-images/issues/14225
    runs-on: ${{ matrix.arch == 'ARM64' && 'windows-11-vs2026-arm' || 'windows-latest' }}
    strategy:
      matrix:
        arch: ['x64', 'ARM64']
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        exclude:
          - arch: ARM64
            python-version: 3.10
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch == 'ARM64' && 'arm64' || 'x64' }}

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@main

      - name: Build PortAudio
        working-directory: pyaudio/portaudio-v19/build/msvc
        run: msbuild portaudio.sln /p:Configuration=ReleaseDLL /p:Platform=${{ matrix.arch }} /m

      - name: Build wheel
        working-directory: pyaudio
        run: python -m pip wheel . --wheel-dir build

      - name: Install virtual audio device
        # VB-CABLE is an x86/x64 kernel driver; skip on the ARM64 runner
        if: matrix.arch != 'ARM64'
        uses: AlekseyMartynov/action-vbcable-win@main

      - name: Test wheel
        working-directory: pyaudio/build
        run: |
          python -m pip install --no-index --find-links . pyaudio
          python -c "import pyaudio; print('PyAudio', pyaudio.__version__); p = pyaudio.PyAudio(); print('device count:', p.get_device_count()); p.terminate()"

      - name: Upload wheels
        uses: actions/upload-artifact@main
        with:
          name: wheels-${{ matrix.arch }}-py${{ matrix.python-version }}
          path: pyaudio/build/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Download all wheels
        uses: actions/download-artifact@main
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Compose release notes
        id: notes
        run: |
          # PyAudio bindings version (independent of the package/tag version)
          pyaudio_ver=$(grep -oP "__version__\s*=\s*['\"]\K[^'\"]+" pyaudio/src/pyaudio.py)
          # derive min/max Python from the built wheels' cpXY tags (cp310 -> 3.10)
          minors=$(ls dist/*.whl | grep -oP 'cp3\K\d+' | sort -n -u)
          min=$(echo "$minors" | head -1)
          max=$(echo "$minors" | tail -1)
          {
            echo "body<<EOF"
            echo "Packaged PyAudio $pyaudio_ver"
            echo ""
            echo "Supports: Python 3.$min ... Python 3.$max, ARM64 x64 (excluding Python 3.$min ARM64)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@master
        with:
          files: dist/*.whl
          body: ${{ steps.notes.outputs.body }}
